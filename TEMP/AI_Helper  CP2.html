            "content": "안녕하세요 학우님, [ 여기스터디 학습지원센터 ] 입니다. \n\n학습진행 및 방법에 있어서, 담당 선생님이나 타부서에서 1차 방법매뉴얼 및 브라우저초기화를 해봤는데도 안되는 경우에는, 아래의 매뉴얼 화면링크 http://yeogi.me/k102 로 화면을 열고 해당 매뉴얼을 다운로드 받아 활용하시면 되십니다. \n\n열려진 화면에서 설명을 읽어보시고, 학우님 상황에 맞는 매뉴얼을 다운로드 받아 참고하여 해결해 보시면 좋을 거 같습니다. \n\n그런데도 안되는 경우에는 학습지원센터 직통번호 02-845-3600 번으로 원격지원 및 원격점검을 요청하시면 점검해 드릴 예정입니다. \n\n오늘도 열공되시고, 오늘도 산뜻하고 기쁘고 행복한 하루 되세요, 감사합니다. #[학습지원센터 활용방법 매뉴얼]#",
            "ref": ["142569", "1"]

    // 2. 엔진 클래스: 질문 분석 및 답변 찾기
    class AI_Engine {
        constructor() {
            this.db = SMART_AI_DB; 
        }

        // [백엔드 피코 클로 엔진 - 띄어쓰기 예외 처리 보완안]
    dispatch(query) {
    if (!query) return null;

    // [클로 0: ROUTER - 어댑티브 맥락 감지]
    const isMobileQuery = /(폰|패드|모바일|안드로이드|아이폰|탭|태블릿)/.test(query);
    
    // [클로 1: PICO - 정제 및 어미 제거]
    const normalize = (text) => text.replace(/(어|요|니다|게|고|다|아요|어요|는데|나요|을|를|이|가)$/g, '').trim();
    const cleanQuery = normalize(query.replace(/\s+/g, ''));
    
    let bestMatch = null;
    let highestScore = 0;

    // [보완된 모바일/PC 강제 라우팅 영역]
    const searchPool = isMobileQuery 
        ? this.db.filter(item => item.theme === "모바일수강") 
        : this.db;

    searchPool.forEach(item => {
        let weightScore = 0;

        // [클로 2: ADAPTIVE WEIGHTING - 맥락 가산점 및 테마 우선순위 조정]
		// 각 테마별 핵심 키워드 정의
		const mobileThemeKeywords = ['모바일', '폰', '패드', '태블릿', '기기', '아이폰', '아이패드'];
		const browserThemeKeywords = ['브라우저', '초기화', '동영상', '끊김', '안나와', '강의', '설정'];

		// 모바일 맥락 확인
		const isMobileCtx = isMobileQuery || mobileThemeKeywords.some(kw => cleanQuery.includes(kw));
		// 브라우저 맥락 확인
		const isBrowserCtx = browserThemeKeywords.some(kw => cleanQuery.includes(kw));

		if (isMobileCtx && item.theme === "모바일수강") {
			weightScore += 100;
		} else if (isBrowserCtx && item.theme === "브라우저초기화") {
			weightScore += 100;
		} else {
			// 키워드가 없으면 가산점 없음! (이제 대한민국만세는 0점이 됩니다)
			weightScore -= 50; 
		}

        // [클로 3: ZERO - 테마 매칭] (30점)
        if (cleanQuery.includes(normalize(item.theme.replace(/\s+/g, '')))) {
            weightScore += 30;
        }

        // [클로 4: NANO - 하이브리드 키워드 매칭]
        item.keywords.forEach(keyword => {
            const cleanKeyword = normalize(keyword.replace(/\s+/g, ''));
            if (cleanQuery.includes(cleanKeyword) || cleanKeyword.includes(cleanQuery)) {
                weightScore += 50; 
            } else if (cleanKeyword.length >= 2 && cleanQuery.length >= 2) {
                let foundMatch = false;
                for (let i = 0; i < cleanKeyword.length - 1; i++) {
                    if (cleanQuery.includes(cleanKeyword.substring(i, i + 2))) {
                        foundMatch = true;
                        break; 
                    }
                }
                if (foundMatch) weightScore += 5; 
            }
        });

        // [클로 5: DECISION - 최종 판별]
        if (weightScore > highestScore && weightScore >= 5) {
            highestScore = weightScore;
            bestMatch = item;
        }
    });

    // [클로 6: GUARDRAIL - 임계값 미달 시 답변 차단]
    if (highestScore < 30) {
        return {
            id: "999", // 시스템에서 관리하는 가상 ID
            theme: "안내",
            keywords: [],
            content: "학우님, 질문의 키워드를 찾기 어렵습니다. 조금 더 구체적으로 말씀해 주시겠어요? (예: 동영상 끊김, 초기화 방법 등)",
            ref: ["0", "0"] // 데이터 규격에 맞는 빈 참조값
        };
    }

    return bestMatch; // 함수 끝, 리턴 완료
        }
    }
	// 엔진 인스턴스 생성
    const engine = new AI_Engine();

    // 3. 실행 및 렌더링 로직 (DOM 할당)
    const queryInput = document.getElementById('query');
    const searchBtn = document.getElementById('searchBtn');
    const linkArea = document.getElementById('link-area');

    // [전역 변수] 1번 퀵버튼 수동 제어용 버퍼 명시
    let lastManualId = null;
    let lastManualType = null;

    // 검색 실행 함수
    function executeSearch() {
        const query = queryInput.value.trim();
        if(!query) {
            alert("질문을 입력해 주세요.");
            return;
        }
        
        const matchedItem = engine.dispatch(query); // 매칭된 객체 통째로 수령
        
        if (!matchedItem) {
            document.getElementById('answer-box').innerHTML = "<b>정보를 찾을 수 없습니다. 다른 핵심 키워드 위주로 검색해 주세요~* ^^ </b>";
            if (linkArea) linkArea.innerHTML = "";
            lastManualId = null;
            lastManualType = null;
            return;
        }

        // [1단계] 📂 매뉴얼 다운로드 단축 키 데이터 맵 매핑 바인딩 (안정성 강화)
        lastManualId = matchedItem.ref[0].split(';')[0]; // 다중 ID 스플릿 방어코드
        lastManualType = matchedItem.ref[1].split(';')[0];

        // [2단계] 동적 URL 조합 레이어 빌드
        let hLink = "https://yeogi.me/k" + matchedItem.id;
        let rLink = "https://yeogi.me/k102"; 
        
        // 특정 도메인 형태 예외 강제 치환 검증 루프
        if(matchedItem.id === "00") hLink = "https://www.939.co.kr";
        if(matchedItem.id === "01") hLink = "https://yeogi.me/k001";
        if(matchedItem.id === "02") hLink = "https://yeogi.me/k002";
        if(matchedItem.id === "03") hLink = "https://yeogi.me/k003";
        if(matchedItem.id === "04") hLink = "https://yeogi.me/k004";
        if(matchedItem.id === "05") hLink = "https://yeogi.me/k005";

        // [3단계] 링크 가시화 인터페이스 드로잉
        if (linkArea) {
            linkArea.innerHTML = `
                <div style="margin-top: -5px;">
                    👉 <b>[ 핵심 ] : </b><a href="${hLink}" target="_blank">${hLink}</a><br>
                    👉 <b>[ 관련 ] : </b><a href="${rLink}" target="_blank">${rLink}</a>
                </div>`;
        }
        
        // [4단계] 구문 분석 렌더러 호출 및 주입
        renderAnswer(matchedItem.content);
    }

    // 데이터 파싱 및 가독성 복구 함수
    // 데이터 파싱 및 가독성 복구 함수
    function renderAnswer(rawText) {
        let output = rawText;

        // 1. 키워드 필터링
        output = output.replace(/\[\d+\]\|/g, '');

        // 2. 개행 기호 안전 변환
        output = output.replace(/rnrn/g, '<br><br>');
        output = output.replace(/\n/g, '<br>');

        // 3. 내부 주석 특수 태그 블라인드 청소
        output = output.replace(/#\[.*?\]#/g, '');

        // [추가] 3.5. 링크 자동 파싱 (오빠가 원하시는 형광 노랑 스타일 적용)
        output = output.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color: #28a745; font-weight: bold; text-decoration: underline;">$1</a>');

        // 4. 최종 주입 보호막
        document.getElementById('answer-box').innerHTML = `<span>${output}</span>`;
    }

    // 1번 퀵버튼 누르면 기기별로 타겟팅해서 강제 다운로드하는 함수
    function triggerManualDownload() {
        if (!lastManualId) {
            alert("먼저 질문을 입력하여 정확한 답변 테마를 확인해 주세요.");
            return;
        }

        // 매뉴얼 다운로드 서버 및 파일 경로 매핑
        const manualUrl = `https://manuals.yeogi.me/${lastManualId}.pdf`;

        // PC/모바일 통합: 새 탭 열기 버퍼 진입
        window.open(manualUrl, '_blank');
        
        // 강제 앵커 다운로드 트리거 아키텍처
        const link = document.createElement('a');
        link.href = manualUrl;
        link.download = `여기스터디_매뉴얼_${lastManualId}.pdf`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // 엔터키 입력 시 검색 연동 편의성 기능 추가
    queryInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            executeSearch();
        }
    });

    // 검색 버튼 클릭 이벤트 연결
    if (searchBtn) {
        searchBtn.addEventListener('click', executeSearch);
    }
    </script>
